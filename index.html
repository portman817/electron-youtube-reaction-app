<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Youtube-Reactions</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body tabindex="-1">
  <!-- obere Leiste -->
  <div id="project-controls">
    <div id="current-project-name" class="project-name-display">Projektname</div>
    <button id="create-project">Neues Projekt</button>
    <button id="manage-projects">Projekte verwalten</button>
  </div>
  
  
  <div id="top-bar">
    <div id="links">
      <!-- gespeicherte Zeitmarken -->
    </div>
    <div id="script">
      <!--Skriptanzeige -->
    </div>
  </div>

  <!--Eingabefeld für die Video-URL -->
  <div id="url-input">
    <input id="video-url" type="text" placeholder="https://www.youtube.com/watch?v=..." />
  </div>

  <!--Videobereich -->
  <div id="player">
    <!-- YouTube Player wird hier eingefügt -->
  </div>

  <script src="renderer.js"></script>
  
  <div id="project-dialog" class="dialog-overlay">
    <div class="dialog-box">
      <h3>Neues Projekt erstellen</h3>
      <input type="text" id="project-name-input" placeholder="Projektname">
      <div class="dialog-buttons">
        <button id="cancel-create">Abbrechen</button>
        <button id="confirm-create">Erstellen</button>
      </div>
    </div>
  </div>
  
</body>
</html>
